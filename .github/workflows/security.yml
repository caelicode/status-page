# Security scanning — auto-deployed by CaeliCode org security policy.
# Calls the reusable workflow from caelicode/.github.
# Do not edit manually; changes will be overwritten on next deployment.

name: Security Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '25 4 * * 1'  # Weekly Monday 04:25 UTC

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    uses: caelicode/.github/.github/workflows/reusable-security-scan.yml@4111022a64da020032ebf91041539cd46e4b9707 # main
    secrets: inherit
    with:
      languages: '["python"]'
      enable-codeql: true
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
